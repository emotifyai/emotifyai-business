<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول السحري - إيموتيفاي</title>
</head>
<body style="margin:0;padding:0;background-color:#0f1117;font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f1117;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:28px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;">إيموتيف<span style="-webkit-text-fill-color:#a78bfa;">اي</span></span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:linear-gradient(145deg,#1a1d2e,#12151f);border:1px solid rgba(167,139,250,0.15);border-radius:16px;padding:40px 36px;">

              <!-- Icon -->
              <div align="center" style="margin-bottom:24px;">
                <div style="display:inline-block;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(167,139,250,0.1));border:1px solid rgba(167,139,250,0.3);border-radius:50%;width:64px;height:64px;line-height:64px;text-align:center;font-size:28px;">🔐</div>
              </div>

              <!-- Heading -->
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#f1f0ff;text-align:center;">تسجيل الدخول السحري</h1>
              <p style="margin:0 0 28px;font-size:15px;color:#9ca3af;text-align:center;line-height:1.6;">لقد طلبت رابطاً لتسجيل الدخول السريع إلى حسابك. لا حاجة لكلمة المرور!</p>

              <!-- CTA Button -->
              <div align="center" style="margin-bottom:28px;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;font-size:15px;font-weight:600;padding:14px 36px;border-radius:10px;letter-spacing:0.3px;">
                  تسجيل الدخول الآن
                </a>
              </div>

              <!-- Divider -->
              <hr style="border:none;border-top:1px solid rgba(255,255,255,0.07);margin:0 0 20px;" />

              <!-- Link fallback -->
              <p style="margin:0 0 8px;font-size:13px;color:#6b7280;text-align:center;">إذا لم يعمل الزر، انسخ هذا الرابط:</p>
              <p style="margin:0;font-size:12px;color:#7c3aed;text-align:center;word-break:break-all;">{{ .ConfirmationURL }}</p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#4b5563;">هذا الرابط صالح لمرة واحدة ولمدة قصيرة.</p>
              <p style="margin:8px 0 0;font-size:12px;color:#374151;">© 2026 إيموتيفاي · <a href="https://emotifyai.com" style="color:#7c3aed;text-decoration:none;">emotifyai.com</a></p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
